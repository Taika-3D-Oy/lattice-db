name: Publish client SDKs to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish-lattice-db-client:
    name: Publish lattice-db-client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with wasm32-wasip3
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install wasm32-wasip2 target (source libc/CRT)
        run: rustup target add wasm32-wasip2

      - name: Bootstrap wasm32-wasip3 sysroot (libc/CRT)
        run: |
          WASIP2_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip2/lib/self-contained"
          WASIP3_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip3/lib/self-contained"
          mkdir -p "$WASIP3_SC"
          cp "$WASIP2_SC"/* "$WASIP3_SC"/

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"

      - name: Publish lattice-db-client
        run: cd lattice-db-client && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-lattice-sql-client:
    name: Publish lattice-sql-client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with wasm32-wasip3
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install wasm32-wasip2 target (source libc/CRT)
        run: rustup target add wasm32-wasip2

      - name: Bootstrap wasm32-wasip3 sysroot (libc/CRT)
        run: |
          WASIP2_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip2/lib/self-contained"
          WASIP3_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip3/lib/self-contained"
          mkdir -p "$WASIP3_SC"
          cp "$WASIP2_SC"/* "$WASIP3_SC"/

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"

      - name: Publish lattice-sql-client
        run: cd lattice-sql-client && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
