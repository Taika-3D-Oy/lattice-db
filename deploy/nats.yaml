# Standalone NATS server for lattice-db local development.
# No TLS, no auth — local dev only. JetStream enabled for KV support.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
data:
  nats.conf: |
    listen: 0.0.0.0:4222
    jetstream {
      store_dir: /data/jetstream
      max_mem: 256MB
      max_file: 1GB
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - containerPort: 4222
              name: client
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
---
# NodePort service for host-machine access (testing from outside the cluster).
apiVersion: v1
kind: Service
metadata:
  name: nats-external
spec:
  type: NodePort
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      nodePort: 30422
      name: client
